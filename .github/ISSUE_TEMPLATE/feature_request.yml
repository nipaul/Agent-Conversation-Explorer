name: Feature request
description: Propose a new capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What gap or friction prompted this request?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you ruled them out

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: Please confirm the request fits within the project's constraints
      options:
        - label: This does not introduce server-side hosting, auth systems, or deployment config (local-only tool)
          required: true
        - label: This stays within the existing stack (React 18 / Vite / Express / TypeScript), or a clear reason for a new dependency is provided above
          required: true
