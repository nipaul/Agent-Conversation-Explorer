name: Bug report
description: Something isn't working correctly
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Browser console output
      description: Open DevTools → Console and paste any errors here
      render: text

  - type: textarea
    id: server
    attributes:
      label: Express server output
      description: Paste any errors from the `npm run dev` terminal (stderr)
      render: text

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"
